<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeviceHub</title>
    <meta
      name="description"
      content="Android device detection and APK installation tool"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("theme");
          const supportDarkMode = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          if (
            theme === "dark" ||
            (theme === "system" && supportDarkMode) ||
            (!theme && supportDarkMode)
          ) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}

        // Disable right-click context menu for native app feel
        document.addEventListener("contextmenu", function (e) {
          // Allow context menu on input, textarea, and elements with .allow-context-menu class
          if (
            e.target.tagName === "INPUT" ||
            e.target.tagName === "TEXTAREA" ||
            e.target.isContentEditable ||
            e.target.closest(".allow-context-menu")
          ) {
            return;
          }
          e.preventDefault();
        });
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
